<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main market</title>
</head>
<style>
:root {
  --emerald: #00c896;
  --radius: 10px
}
    body {
        font-family: Arial;
        margin: 0;
        background: #f4f6f8;
    }

    header {
        background: #2c5364;
        color: white;
        padding: 15px;
        text-align: center;
        font-style: italic;
        font-weight: 500;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 1.5rem;

    }

    .container {
        display: flex;
        gap: 20px;
        padding: 20px;
    }

    /* PRODUCTS */
    .products {
        flex: 2;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }

    .product {
        background: rgb(243, 6, 6);
        padding: 15px;
        border-radius: 10px;
        text-align: center;
    }

    /* CART */
    .cart {
        flex: 1;
        background: rgb(135, 4, 251);
        padding: 15px;
        border-radius: 10px;
        width: 100%;
        height: 100%;

    }

    button {
  background: var(--emerald);
  border: none;
  padding: 0.75rem 1.5rem;
  cursor: pointer;
  border-radius: var(--radius);
  width: 100%;
  font-weight: bold;

  /* ✨ CONSTANT GLOW */
  box-shadow: 0 0 12px rgba(208, 249, 4, 0.6),
              0 0 24px rgba(255, 34, 5, 0.4),
              0 0 36px rgba(0, 200, 150, 0.2);

  transition: all 0.25s ease;
}

#clear-btn:hover {
  box-shadow: 0 0 18px rgba(0, 200, 150, 0.9),
              0 0 36px rgba(0, 200, 150, 0.6),
              0 0 60px rgba(0, 200, 150, 0.3);
  transform: translateY(-2px);
}
</style>
<body>
    <header>Taifa market Kenya</header>
    <p>Your cart items <span id="cartCount">0</span></p>
    <div class="container">

  <!-- PRODUCTS -->
  <div class="products" id="productList"></div>

  <!-- CART -->
  <div class="cart">
    <h3>Your Cart</h3>
    <div id="cartList"></div>
    <h4>Total: Ksh <span id="total">0</span></h4>
    <br><button onclick="clearCart()">Clear Cart</button></br>
    <br><button onclick="purchase()">purchase</button></br>
 </div>

</div>
<script>
    const state = {
    products: [
        { id: 1, name: "Laptop", price: 999, image: "..." },
        { id: 2, name: "Phone", price: 699, image: "..." },
        { id: 3, name: "Headphones", price: 199, image: "..." }
    ],
    cart: []  // { productId, quantity }
};

function saveCart(){
    localStorage.setItem('cart', JSON.stringify(state.cart));
}
function loadCart(){
    const saved = localStorage.getItem('cart');
    if(saved){
        state.cart = JSON.parse(saved);
    }
}
function addToCart(productId) {
    const existing = state.cart.find(item => item.productId === productId);
    
    if (existing) {
        existing.quantity++;
    } else {
        state.cart.push({ productId, quantity: 1 });
    }
    
    saveCart();
    renderCart();
}

    function clearCart() {

function removeFromCart(productId) {

}
     // Get cart total

function getCartTotal() {
    return state.cart.reduce((total, item) => {
        const product = state.products.find(p => p.id === item.productId);
        if (!product) return total;
        return total + (product.price * item.quantity);
    }, 0);
}

function getCartCount() {
    return state.cart.reduce((count, item) => count + item.quantity, 0);
}
// ================= PURCHASE =================
function purchase() {
    alert("Purchase successful!");
    clearCart();
}
// ================= PRODUCTS =================
function renderProducts() {
  const container = document.getElementById("productList");
  container.innerHTML = "";

  state.products.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <h3>${p.name}</h3>
        <p>Ksh ${p.price}</p>
        <button onclick="addToCart(${p.id})">Add to Cart</button>
      </div>
    `;
  });
}
function renderCart() {
    const container = document.getElementById("cartList");
    container.innerHTML = "";

    if (state.cart.length === 0) {
        container.innerHTML = "<p>Cart is empty</p>";
    }

    state.cart.forEach(item => {
        const product = state.products.find(p => p.id === item.productId);
        if (!product) return;

        container.innerHTML += `
            <div>
                ${product.name} x${item.quantity}
                <button onclick="updateQuantity(${product.id}, 1)">+</button>
                <button onclick="updateQuantity(${product.id}, -1)">-</button>
                <button onclick="removeFromCart(${product.id})">X</button>
            </div>
        `;
    });

    document.getElementById("total").textContent = getCartTotal();
    document.getElementById("cartCount").textContent = getCartCount();
}
loadCart();
renderProducts();
renderCart();
</script>

</body>

</html>
